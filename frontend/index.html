<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECH — Enterprise Collaboration Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <!-- ===================== 로그인 화면 ===================== -->
    <div id="loginPage" class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <span class="login-logo-icon">🏢</span>
          <h1 class="login-title">Enterprise Collaboration Hub</h1>
          <p class="login-subtitle">사내 협업 플랫폼</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="form-group">
            <label for="loginId">사원번호 또는 이메일</label>
            <input
              id="loginId"
              type="text"
              placeholder="예) EMP001 또는 hong@test.com"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input
              id="loginPassword"
              type="password"
              placeholder="비밀번호 입력"
              autocomplete="current-password"
              required
            />
          </div>
          <p id="loginError" class="login-error hidden"></p>
          <button type="submit" id="loginBtn" class="btn-primary">로그인</button>
        </form>

        <p class="login-hint">
          테스트 계정 기본 비밀번호: <code>Test1234!</code>
        </p>
      </div>
    </div>

    <!-- ===================== 메인 앱 ===================== -->
    <div id="mainApp" class="hidden">

      <!-- 상단 헤더 -->
      <header class="app-header">
        <div class="app-header-left">
          <span class="app-header-logo">🏢</span>
          <span class="app-header-name">ECH</span>
        </div>
        <div class="app-header-center">
          <form id="searchForm" class="search-form" autocomplete="off">
            <input id="searchInput" type="search" placeholder="메시지, 파일, 업무, 칸반 검색..." />
            <button type="submit" class="search-btn">🔍</button>
          </form>
        </div>
        <div class="app-header-right">
          <span id="userInfoBadge" class="user-badge"></span>
          <button id="logoutBtn" class="btn-logout">로그아웃</button>
        </div>
      </header>

      <!-- 탭 네비게이션 -->
      <nav class="app-tabs">
        <button class="tab-btn active" data-tab="chat">💬 채팅</button>
        <button class="tab-btn admin-only hidden" data-tab="releases">🚀 배포 관리</button>
      </nav>

      <!-- 본문 -->
      <main class="app-main">

        <!-- 채팅 탭 -->
        <div id="tab-chat" class="tab-panel">
          <div class="app-card">
            <h2>채널 메시지</h2>
            <div id="messages" class="messages"></div>
            <form id="messageForm" class="message-form">
              <input id="channelId" type="number" placeholder="채널 ID" value="1" min="1" />
              <input id="messageInput" type="text" placeholder="메시지 입력 후 Enter" />
              <button type="submit" class="btn-primary">보내기</button>
            </form>
          </div>
        </div>

        <!-- 배포 관리 탭 (관리자 전용) -->
        <div id="tab-releases" class="tab-panel hidden">
          <div class="app-card">
            <div class="release-header">
              <h2>🚀 배포 버전 관리</h2>
              <button id="refreshReleasesBtn" class="btn-secondary">새로고침</button>
            </div>

            <!-- 업로드 폼 -->
            <details class="release-upload-details">
              <summary>새 릴리즈 업로드</summary>
              <form id="releaseUploadForm" class="release-upload-form">
                <div class="form-row">
                  <input id="releaseVersion" type="text" placeholder="버전 (예: 1.2.0)" required />
                  <input id="releaseFile" type="file" accept=".war,.jar" required />
                </div>
                <input id="releaseDescription" type="text" placeholder="변경 내역 (선택)" />
                <button type="submit" class="btn-primary">업로드</button>
                <span id="releaseUploadStatus" class="upload-status"></span>
              </form>
            </details>

            <!-- 버전 목록 -->
            <table class="release-table">
              <thead>
                <tr>
                  <th>버전</th><th>파일명</th><th>크기</th><th>상태</th><th>업로드 일시</th><th>활성화 일시</th><th>작업</th>
                </tr>
              </thead>
              <tbody id="releaseTableBody"></tbody>
            </table>
          </div>

          <!-- 배포 이력 -->
          <div class="app-card">
            <h2>📋 배포 이력</h2>
            <table class="release-table">
              <thead>
                <tr>
                  <th>일시</th><th>액션</th><th>이전 버전</th><th>배포 버전</th><th>메모</th>
                </tr>
              </thead>
              <tbody id="deployHistoryBody"></tbody>
            </table>
          </div>
        </div>

      </main>

    </div>

    <!-- 검색 결과 모달 -->
    <div id="searchModal" class="search-modal hidden" role="dialog" aria-modal="true">
      <div class="search-modal-backdrop" id="searchBackdrop"></div>
      <div class="search-modal-content">
        <div class="search-modal-header">
          <h3 id="searchModalTitle">검색 결과</h3>
          <div class="search-filter">
            <select id="searchTypeSelect">
              <option value="ALL">전체</option>
              <option value="MESSAGES">메시지</option>
              <option value="FILES">파일</option>
              <option value="WORK_ITEMS">업무 항목</option>
              <option value="KANBAN_CARDS">칸반 카드</option>
            </select>
          </div>
          <button id="searchModalClose" class="modal-close-btn">✕</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
