<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECH — Enterprise Collaboration Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <!-- ===================== 로그인 화면 ===================== -->
    <div id="loginPage" class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <span class="login-logo-icon">🏢</span>
          <h1 class="login-title">Enterprise Collaboration Hub</h1>
          <p class="login-subtitle">사내 협업 플랫폼</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="form-group">
            <label for="loginId">사원번호 또는 이메일</label>
            <input
              id="loginId"
              type="text"
              placeholder="예) EMP001 또는 hong@test.com"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input
              id="loginPassword"
              type="password"
              placeholder="비밀번호 입력"
              autocomplete="current-password"
              required
            />
          </div>
          <p id="loginError" class="login-error hidden"></p>
          <button type="submit" id="loginBtn" class="btn-primary">로그인</button>
        </form>

        <p class="login-hint">
          테스트 계정 기본 비밀번호: <code>Test1234!</code>
        </p>
      </div>
    </div>

    <!-- ===================== 메인 앱 ===================== -->
    <div id="mainApp" class="hidden">

      <!-- 상단 헤더 -->
      <header class="app-header">
        <div class="app-header-left">
          <span class="app-header-logo">🏢</span>
          <span class="app-header-name">ECH</span>
        </div>
        <div class="app-header-right">
          <span id="userInfoBadge" class="user-badge"></span>
          <button id="logoutBtn" class="btn-logout">로그아웃</button>
        </div>
      </header>

      <!-- 본문 -->
      <main class="app-main">
        <div class="app-card">
          <h2>채널 메시지</h2>
          <div id="messages" class="messages"></div>
          <form id="messageForm" class="message-form">
            <input id="channelId" type="number" placeholder="채널 ID" value="1" min="1" />
            <input id="messageInput" type="text" placeholder="메시지 입력 후 Enter" />
            <button type="submit" class="btn-primary">보내기</button>
          </form>
        </div>
      </main>

    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
