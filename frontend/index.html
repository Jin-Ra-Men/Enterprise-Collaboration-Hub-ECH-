<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECH Frontend</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Enterprise Collaboration Hub</h1>
      <p>README 기반 초기 UI 스켈레톤</p>

      <section class="card">
        <h2>채널 메시지</h2>
        <div id="messages" class="messages"></div>
        <form id="messageForm">
          <input id="channelId" placeholder="channel-id(number)" value="1" />
          <input id="senderId" placeholder="sender-id(number)" value="1" />
          <input id="messageInput" placeholder="메시지 입력" />
          <button type="submit">보내기</button>
        </form>
      </section>
    </main>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
