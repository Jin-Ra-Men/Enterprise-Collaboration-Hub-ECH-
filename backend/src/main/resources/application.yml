server:
  port: ${SPRING_PORT:8080}

spring:
  application:
    name: ech-backend
  servlet:
    multipart:
      # WAR/JAR 업로드를 위한 파일 크기 제한 (운영 환경에서 조정 가능)
      max-file-size: ${MAX_UPLOAD_SIZE:500MB}
      max-request-size: ${MAX_REQUEST_SIZE:500MB}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ech}
    username: ${DB_USER:ech_user}
    password: ${DB_PASSWORD:ech_password}
    hikari:
      # 커넥션 풀 최대 크기 (CPU 코어 수 * 2 ~ 4 권장)
      maximum-pool-size: ${DB_POOL_MAX:10}
      # 최소 유휴 커넥션 유지 수 (응답성 향상)
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      # 커넥션 획득 대기 최대 시간
      connection-timeout: ${DB_POOL_CONNECT_TIMEOUT_MS:30000}
      # 유휴 커넥션 반환 시간 (10분)
      idle-timeout: 600000
      # 커넥션 최대 수명 (30분, PostgreSQL 기본 세션 수명 이하로 설정)
      max-lifetime: 1800000
      # 커넥션 검증 쿼리 (드라이버가 지원하지 않을 때 폴백)
      connection-test-query: SELECT 1
      # 커넥션 풀 이름 (모니터링에서 식별)
      pool-name: ECH-HikariPool
      # 느린 커넥션 획득 경고 임계치 (5초)
      keepalive-time: 300000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  # 운영 환경에서는 반드시 32자 이상의 무작위 값으로 교체할 것
  secret: ${JWT_SECRET:ECH-dev-jwt-secret-key-change-in-prod}
  # 기본 8시간 (28800000 ms)
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

app:
  # 릴리즈 파일 저장 디렉토리 (운영 환경에서 절대 경로 지정 권장)
  releases-dir: ${APP_RELEASES_DIR:./releases}
  # 첨부파일 저장 기본 경로 (DB app_settings 에서 덮어쓸 수 있음)
  file-storage-dir: ${FILE_STORAGE_DIR:D:/testStorage}
