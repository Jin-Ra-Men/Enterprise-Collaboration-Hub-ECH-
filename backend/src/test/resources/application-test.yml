spring:
  datasource:
    url: jdbc:h2:mem:echtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

jwt:
  secret: ech-test-jwt-secret-key-minimum-32-characters!
  expiration-ms: 3600000

app:
  file-storage-dir: ${java.io.tmpdir}/ech-test-storage
  releases-dir: ${java.io.tmpdir}/ech-test-releases
