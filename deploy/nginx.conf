# ============================================================
#  Nginx for Windows — ECH 리버스 프록시 설정 (선택 사항)
#
#  사용 시:
#    - 클라이언트가 포트 없이 http://ech.co.kr 로 접속 가능
#    - Spring Boot(8080) 와 Realtime(3001) 을 포트 80 으로 통합
#
#  미사용 시 (기본 권장):
#    - 프론트: http://ech.co.kr:8080
#    - 소켓:   http://ech.co.kr:3001  (자동 추론)
#    - Nginx 없이도 정상 동작
# ============================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── 업스트림 ────────────────────────────────────────────
    upstream ech_backend {
        server 127.0.0.1:8080;
    }

    upstream ech_realtime {
        server 127.0.0.1:3001;
    }

    server {
        listen       80;
        server_name  ech.co.kr;

        # 파일 업로드 크기 제한 (env.prod MAX_UPLOAD_SIZE 와 맞출 것)
        client_max_body_size 500m;

        # ── Socket.IO (Realtime) ─────────────────────────────
        # 반드시 /api 보다 먼저 선언
        location /socket.io/ {
            proxy_pass         http://ech_realtime;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ── Realtime health/presence HTTP ───────────────────
        location /health {
            proxy_pass http://ech_realtime;
            proxy_set_header Host $host;
        }
        location /presence {
            proxy_pass http://ech_realtime;
            proxy_set_header Host $host;
        }

        # ── Spring Boot (API + 프론트엔드 정적) ─────────────
        location / {
            proxy_pass         http://ech_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }
    }
}
